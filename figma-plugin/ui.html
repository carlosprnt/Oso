<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #F7F8FA;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      gap: 12px;
    }
    .logo {
      width: 48px; height: 48px;
      background: #6366F1;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 22px; font-weight: 800;
      margin-bottom: 4px;
    }
    h1 { font-size: 15px; font-weight: 700; color: #0D0F12; }
    p  { font-size: 12px; color: #6B7280; text-align: center; max-width: 200px; line-height: 1.5; }
    button {
      width: 100%;
      padding: 10px 16px;
      background: #6366F1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #4338CA; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status { font-size: 11px; color: #6B7280; min-height: 16px; }
  </style>
</head>
<body>
  <div class="logo">P</div>
  <h1>Perezoso Screens</h1>
  <p>Genera los 4 screens principales del app en tu archivo de Figma.</p>
  <button id="btn" onclick="generate()">Generate screens</button>
  <span id="status"></span>

  <script>
    function generate() {
      document.getElementById('btn').disabled = true;
      document.getElementById('status').textContent = 'Generating…';
      parent.postMessage({ pluginMessage: { type: 'generate' } }, '*');
    }
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (msg?.type === 'done') {
        document.getElementById('status').textContent = '✓ Done! ' + msg.count + ' screens created.';
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').textContent = 'Generate again';
      }
      if (msg?.type === 'error') {
        document.getElementById('status').textContent = '✗ ' + msg.message;
        document.getElementById('btn').disabled = false;
      }
    };
  </script>
</body>
</html>
